# ─────────────────────────────────────────────────────────────────────────────
# BOAT docker-compose — Deploy on Linux MPU
#
# Run:  docker compose up -d
# Logs: docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:
  boat:
    image: nptttn/coding-th-robotics:2026
    container_name: rescue_boat
    command: python vision/detector.py
    
    volumes:
      - ./vision:/app/vision
      - ./models/yolo26n.onnx:/app/model.onnx:ro
      - /dev:/dev

    environment:
      - CAMERA_INDEX=0
      - SERIAL_PORT=/dev/ttyACM0
      - SERIAL_BAUD=9600
      - ROI_PERCENT=60
      - HOST=0.0.0.0
      - PORT=8080
      - MODEL_PATH=/app/model.onnx
      - INPUT_W=640
      - INPUT_H=640
      - CONF_THRESH=0.45
      # Allow requests from the operator PC (CORS)
      - CORS_ORIGINS=*

    ports:
      - "8080:8080"   # WebSocket Video feed
      
    network_mode: host
    ipc: host
    privileged: true
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
