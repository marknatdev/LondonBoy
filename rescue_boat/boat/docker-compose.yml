# ─────────────────────────────────────────────────────────────────────────────
# BOAT docker-compose — Lightweight relay on Arduino UNO Q
#
# Streams raw camera frames and relays serial commands to Arduino MCU.
# No YOLO inference — that runs on the PC.
#
# Run:  docker compose up -d
# Logs: docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:
  boat:
    image: nptttn/coding-th-robotics:2026
    container_name: rescue_boat
    command: sh -c "pip install pyserial fastapi uvicorn websockets && python vision/relay_server.py"

    volumes:
      - ./vision:/app/vision
      - /dev:/dev

    environment:
      - CAMERA_ID=0
      - SERIAL_PORT=/dev/ttyACM0
      - SERIAL_BAUD=9600
      - PORT=5000

    network_mode: host
    ipc: host
    privileged: true
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
