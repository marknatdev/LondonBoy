# ─────────────────────────────────────────────────────────────────────────────
# BOAT docker-compose — Deploy on Arduino UNO Q
#
# Run:  docker compose up -d
# Logs: docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:
  boat:
    image: nptttn/coding-th-robotics:2026
    container_name: rescue_boat
    command: python server/boat_app.py
    
    volumes:
      - ./server:/app/server
      - ./vision:/app/vision
      - ./models/yolo26n.onnx:/app/model.onnx:ro
      - /dev:/dev
      - model_cache:/root/.config/Ultralytics

    environment:
      - CAMERA_INDEX=0
      - SERIAL_PORT=/dev/ttyACM0
      - SERIAL_BAUD=9600
      - ROI_LINE_PERCENT=60
      - HOST=0.0.0.0
      - PORT=5000
      - MODEL_PATH=/app/model.onnx
      - INPUT_W=640
      - INPUT_H=640
      # Allow requests from the operator PC (CORS)
      - CORS_ORIGINS=*

    ports:
      - "5000:5000"   # Boat API — PC connects here
      
    network_mode: host
    ipc: host
    privileged: true
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  model_cache:
    driver: local
