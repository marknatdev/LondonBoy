# ─────────────────────────────────────────────────────────────────────────────
# PC docker-compose — Object detection + Operator Dashboard
#
# Pulls raw frames from the boat, runs YOLO locally, and serves the dashboard.
#
# ⚠ Set BOAT_IP to the boat's WiFi IP before running!
#
# Run:  docker compose up -d
# Logs: docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:
  pc:
    image: python:3.11-slim
    container_name: rescue_pc
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 &&
             pip install --no-cache-dir -r vision/requirements.txt &&
             python vision/detector.py"

    working_dir: /app

    volumes:
      - ./vision:/app/vision
      - ./dashboard:/app/dashboard
      - ./models/yolo26n.onnx:/app/model.onnx:ro

    environment:
      - BOAT_IP=192.168.1.100       # ← Change this to your boat's IP
      - BOAT_PORT=5000
      - PORT=8080
      - MODEL_PATH=/app/model.onnx
      - DASHBOARD_DIR=/app/dashboard
      - INPUT_W=640
      - INPUT_H=640
      - CONF_THRESH=0.45
      - ROI_PERCENT=60

    ports:
      - "8080:8080"

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
