# ─────────────────────────────────────────────────────────────────────────────
# PC docker-compose — Deploy on Operator PC / Laptop
#
# Before running, set the boat's IP:
#   BOAT_IP=192.168.1.xxx docker compose up
# Or edit the BOAT_IP value below.
#
# Access dashboard at: http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

services:
  pc_dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: rescue_boat_pc:latest
    container_name: rescue_boat_pc
    restart: unless-stopped

    ports:
      - "8080:8080"   # Open browser to http://localhost:8080

    environment:
      # ── SET THIS to your boat's WiFi IP address ──
      - BOAT_IP=192.168.1.100
      - BOAT_PORT=5000
      - HOST=0.0.0.0
      - PORT=8080

    # ── No device access needed — PC has no camera/serial ──────────────

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
